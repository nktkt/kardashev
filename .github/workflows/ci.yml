name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Manual anonymous clone — bypasses actions/checkout entirely. The
      # GITHUB_TOKEN-based fetch that actions/checkout performs returns 403
      # in this repo's workflow context (suspected new-account / new-repo
      # token-issuance issue). Anonymous git clone of a public repo should
      # not require any credential at all.
      - name: Clone repo (anonymous)
        shell: bash
        run: |
          set -euo pipefail
          # For a `pull_request` event, $GITHUB_REF_NAME is the synthetic
          # `<PR#>/merge` ref, which is not a cloneable branch — clone the PR's
          # HEAD branch instead. For a `push` event $GITHUB_HEAD_REF is empty,
          # so we fall back to $GITHUB_REF_NAME (the pushed branch, e.g. main).
          REF="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          echo "Cloning branch: $REF"
          git clone --depth 1 -b "$REF" \
            "https://github.com/$GITHUB_REPOSITORY.git" .
          echo "--- workspace contents ---"
          ls -la

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm
          echo "/opt/homebrew/opt/llvm/bin" >> "$GITHUB_PATH"

      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev clang
          LLVM_CFG=$(command -v llvm-config || ls /usr/bin/llvm-config* | head -1)
          echo "LLVM_CONFIG=$LLVM_CFG" >> "$GITHUB_ENV"

      - name: Install Bazelisk
        shell: bash
        run: |
          set -euo pipefail
          BAZELISK_VERSION="v1.29.0"
          case "$RUNNER_OS" in
            Linux)  ASSET="bazelisk-linux-amd64" ;;
            macOS)  ASSET="bazelisk-darwin-arm64" ;;
            *)      echo "Unsupported runner OS: $RUNNER_OS" >&2; exit 1 ;;
          esac
          URL="https://github.com/bazelbuild/bazelisk/releases/download/${BAZELISK_VERSION}/${ASSET}"
          echo "Downloading $URL"
          sudo curl -fsSL -o /usr/local/bin/bazel "$URL"
          sudo chmod +x /usr/local/bin/bazel
          bazel --version

      - name: Bazel build
        run: bazel build //...

      - name: Bazel test
        run: bazel test //... --test_output=errors

      # Surface every failing test's captured log (Bazel keeps them under
      # bazel-testlogs/ but an Aborted test prints nothing to the console with
      # --test_output=errors). Lets a red CI be diagnosed from the run log alone.
      - name: Dump failing test logs
        if: failure()
        shell: bash
        run: |
          echo "=== failing test logs (bazel-testlogs) ==="
          if [ -d bazel-testlogs ]; then
            find -L bazel-testlogs -name 'test.log' | while read -r log; do
              # Only the failures: a passing test.log starts with a PASSED banner.
              if ! grep -q 'PASSED' "$log" 2>/dev/null; then
                echo "########## $log ##########"
                tail -80 "$log" || true
              fi
            done
          else
            echo "(no bazel-testlogs directory)"
          fi

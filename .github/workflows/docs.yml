# Build the mdBook documentation site (from docs/ + book.toml) and deploy it to
# GitHub Pages. The Rust-ecosystem standard toolchain. Requires Pages to be
# enabled with the "GitHub Actions" source (Settings -> Pages -> Build and
# deployment -> Source: GitHub Actions).
name: docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'book.toml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Read the repo; write to Pages with an OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: '0.4.40'
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          curl -sSL \
            "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz --directory=/usr/local/bin
      - name: Build the book
        run: mdbook build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
